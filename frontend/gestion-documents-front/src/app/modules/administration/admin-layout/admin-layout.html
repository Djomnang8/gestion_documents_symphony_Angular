<!-- src/app/modules/administration/admin-layout/admin-layout.html -->
<!-- CORRECTION : <app-language-switcher> RETIRÉ du sidebar.
     La langue choisie sur la page Login est automatiquement
     propagée ici via TranslationService singleton + localStorage. -->
<div class="layout-wrapper" [class.sidebar-collapsed]="sidebarCollapsed">

  <!-- SIDEBAR -->
  <aside class="sidebar" [style.background]="'linear-gradient(180deg,#1e1b4b 0%,#312e81 100%)'">

    <div class="sidebar-header" style="color:#fff">
      <button class="toggle-btn" (click)="sidebarCollapsed = !sidebarCollapsed" style="color:#fff">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
      </button>
      <div class="logo-zone">
        <span class="logo-icon">🏛️</span>
        <div class="logo-text" style="color:#fff">
          <span class="logo-title">Administration</span>
          <span class="logo-subtitle" style="opacity:.55">Espace Admin</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="dashboard" routerLinkActive="nav-active" class="nav-item"
         style="color:rgba(255,255,255,.85)">
        <span class="nav-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504
                     1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125
                     1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125
                     1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0
                     .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0
                     1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125
                     1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0
                     .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0
                     1-1.125-1.125V4.125Z"/>
          </svg>
        </span>
        <span class="nav-label">Tableau de bord</span>
      </a>

      <a routerLink="utilisateurs" routerLinkActive="nav-active" class="nav-item"
         style="color:rgba(255,255,255,.85)">
        <span class="nav-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0
                     4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003
                     c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318
                     0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109
                     a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1
                     1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625
                     0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
          </svg>
        </span>
        <span class="nav-label">Gestion utilisateurs</span>
      </a>

      <a routerLink="journaux" routerLinkActive="nav-active" class="nav-item"
         style="color:rgba(255,255,255,.85)">
        <span class="nav-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125
                     1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25
                     m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125
                     1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621
                     0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
          </svg>
        </span>
        <span class="nav-label">Journaux système</span>
      </a>

      <a routerLink="/agent/dashboard" class="nav-item nav-item--meta">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </span>
        <span class="nav-label">Espace Agent</span>
      </a>

      <a routerLink="/archiviste/dashboard" class="nav-item nav-item--meta">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="21 8 21 21 3 21 3 8"/>
            <rect x="1" y="3" width="22" height="5"/>
            <line x1="10" y1="12" x2="14" y2="12"/>
          </svg>
        </span>
        <span class="nav-label">Espace Archiviste</span>
      </a>
    </nav>

    <!-- User bloc cliquable → Profil -->
    <div class="user-bloc user-bloc--cliquable" (click)="voirProfil()" style="color:#fff">
      <div class="user-avatar"
           style="background:rgba(255,255,255,.18);color:#fff;border-radius:50%">
        {{ initiales }}
      </div>
      <div class="user-info">
        <span class="user-nom">{{ user?.prenom }}</span>
        <span class="user-role">{{ user?.nom }}</span>
        <span class="user-profil-hint">Voir le profil →</span>
      </div>
    </div>

    <!-- Footer sidebar — PAS de sélecteur de langue ici -->
    <div class="sidebar-footer">
      <button class="deconnexion-btn" (click)="deconnecter()"
              style="color:rgba(255,255,255,.8)">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0
                   0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0
                   0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
        </svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- OVERLAY mobile -->
  <div class="sidebar-overlay" (click)="sidebarCollapsed = true"></div>

  <!-- CONTENU -->
  <main class="main-content">
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
